## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: ">=5.0"
  ## Import needed components only
  espressif/esp_h264:
    version: "1.3"
    rules:
    - if: target in [esp32p4, esp32s3]
  espressif/esp_peer:
    version: "*"
    override_path: ../../../components/esp_peer
  apprtc_signal:
    path: ../../../components/esp_webrtc/impl/apprtc_signal
    version: "*"
